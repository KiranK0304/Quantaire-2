<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pattern Detection Scanner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="root">
    <div class="topbar">
      <div class="topbar-left">
        <span class="pd-badge">PD</span>
        <div>
          <div class="topbar-title">Pattern Detection Scanner</div>
          <div class="topbar-sub">Experimental YOLOv8 candlestick analysis &middot; by Kiran</div>
        </div>
      </div>
      <div class="sys">
        <div class="dot"></div>SYS: ONLINE
      </div>
    </div>

    {% block content %}{% endblock %}

  </div>
  
  <div id="loading-overlay" style="display: none; position: fixed; inset: 0; background: rgba(4, 8, 15, 0.8); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; color: #00e5a0; font-family: monospace;">
      <div style="font-size: 24px; margin-bottom: 12px;"><i class="ti ti-loader-2" style="animation: spin 1s linear infinite;"></i></div>
      <p style="font-size: 12px; letter-spacing: 1px;">Initializing scan parameters...<br><small style="color: #3a4f6a;">This will take ~10-15 seconds.</small></p>
  </div>

  <style>
      @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
